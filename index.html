<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You Teachers</title>
  <style>
    :root{--p:#ff3ea5;--v:#7c3aed;--b:#0ea5e9;--y:#ffd166;--txt:#2a105b}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:"Cairo",sans-serif;color:var(--txt);
      background:linear-gradient(-45deg,var(--p),var(--v),var(--b),var(--y));background-size:300% 300%;animation:bg 12s ease infinite;
      display:grid;place-items:center;padding:16px}
    @keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
    .card{width:min(950px,100%);background:#ffffffea;border-radius:28px;padding:22px;box-shadow:0 18px 55px #22094a33}
    .hero{text-align:center}
    .heart{font-size:clamp(95px,18vw,155px);animation:beat 1.1s infinite}
    @keyframes beat{0%,100%{transform:scale(1)}35%{transform:scale(1.12)}60%{transform:scale(.96)}}
    h1{margin:0;font-size:clamp(30px,6vw,52px)}
    .ui{margin-top:16px;display:grid;gap:12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
    .box{background:linear-gradient(120deg,#fff7bf,#e5ffea);padding:12px;border-radius:15px;border:2px solid #fff}
    select,button{width:100%;padding:10px;border-radius:10px;border:0;font-weight:700}
    button{background:linear-gradient(120deg,var(--p),var(--v));color:#fff;cursor:pointer}
    #result{padding:12px;border-radius:12px;background:linear-gradient(120deg,#e0f5ff,#f6e2ff);min-height:44px;font-weight:800}
    pre{background:#12072d;color:#bcffd6;padding:10px;border-radius:10px;direction:ltr;overflow:auto}
  </style>
</head>
<body>
  <main class="card">
    <section class="hero">
      <div class="heart">💖</div>
      <h1>Thank you, teachers.</h1>
      <p>موقع جميل بألوان زاهية للمدرسين 🌟</p>
    </section>

    <section class="ui">
      <div class="grid">
        <div class="box">
          <h3>اختار هدية</h3>
          <select id="gift">
            <option>🌹 ورد</option><option>📚 كتاب</option><option>💌 كارت شكر</option><option>🍫 شوكولاتة</option>
          </select>
        </div>
        <div class="box">
          <h3>اختار رسالة</h3>
          <select id="message">
            <option>Thank you, teachers.</option><option>أنتم سبب نجاحنا ❤️</option><option>شكراً لدعمكم 🌟</option>
          </select>
        </div>
        <div class="box">
          <h3>اختار ثيم</h3>
          <select id="theme">
            <option value="party">Party</option><option value="sunset">Sunset</option><option value="ocean">Ocean</option>
          </select>
          <button id="show">اعرض المفاجأة</button>
        </div>
      </div>
      <div id="result">اختار من القوائم وبعدين اضغط الزر ✨</div>
      <div class="box">
        <h3>كود C# المستخدم:</h3>
        <pre id="csView"></pre>
      </div>
    </section>
  </main>

  <script>
    const themes={
      party:"linear-gradient(-45deg,#ff3ea5,#7c3aed,#0ea5e9,#22c55e)",
      sunset:"linear-gradient(-45deg,#ff6b6b,#ff9f43,#ffd166,#f368e0)",
      ocean:"linear-gradient(-45deg,#0284c7,#22d3ee,#7dd3fc,#a78bfa)"
    };
    document.getElementById('show').addEventListener('click',()=>{
      const gift=document.getElementById('gift').value;
      const msg=document.getElementById('message').value;
      const theme=document.getElementById('theme').value;
      document.body.style.background=themes[theme];
      document.body.style.backgroundSize='300% 300%';
      document.getElementById('result').textContent=`🎁 مفاجأتك: ${gift} — ${msg}`;
    });
    fetch('app.cs').then(r=>r.text()).then(t=>document.getElementById('csView').textContent=t);
  </script>
</body>
</html>
